[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  NEXT_DISABLE_TURBOPACK = "1"
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_DEFAULT_LAT,NEXT_PUBLIC_DEFAULT_LNG,NEXT_PUBLIC_ADMIN_PIN,NEXT_PUBLIC_MAPILLARY_TOKEN,NEXT_PUBLIC_BASE_URL,NEXT_PUBLIC_FRONTEND_URL,CLOUDINARY_CLOUD_NAME"
  SECRETS_SCAN_OMIT_PATHS = "scripts/"

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"

